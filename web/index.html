<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>buscai</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>buscai</h1>
  </header>

  <div id="gate" class="gate-overlay" hidden>
    <form id="gate-form" class="gate-form">
      <label for="gate-api-key">Chave de acesso</label>
      <input id="gate-api-key" type="password" autocomplete="off" required />
      <button type="submit">Entrar</button>
      <p id="gate-error" class="gate-error" hidden></p>
    </form>
  </div>

  <main id="app" hidden></main>

  <script src="app.js" defer></script>
</body>
</html>
