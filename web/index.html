<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>buscai</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>buscai</h1>
  </header>

  <div id="gate" class="gate-overlay" hidden>
    <form id="gate-form" class="gate-form">
      <label for="gate-api-key">Chave de acesso</label>
      <input id="gate-api-key" type="password" autocomplete="off" required />
      <button type="submit">Entrar</button>
      <p id="gate-error" class="gate-error" hidden></p>
    </form>
  </div>

  <main id="app" hidden>
    <aside id="sidebar" class="sidebar">
      <button id="new-conversation-btn" type="button">Nova conversa</button>

      <section class="scope-selector">
        <h2>Livros</h2>
        <label class="scope-all">
          <input id="scope-all" type="checkbox" checked />
          Todos os livros
        </label>
        <ul id="scope-book-list" class="scope-book-list"></ul>
      </section>

      <section class="conversation-history">
        <h2>Conversas</h2>
        <ul id="conversation-list" class="conversation-list"></ul>
      </section>
    </aside>

    <section id="chat" class="chat">
      <div id="message-list" class="message-list"></div>
      <p id="chat-status" class="chat-status" hidden></p>
      <form id="chat-form" class="chat-form">
        <input
          id="chat-input"
          type="text"
          placeholder="Pergunte sobre os livros selecionados..."
          autocomplete="off"
          required
        />
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
