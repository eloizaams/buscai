spring:
  application:
    name: backend
  datasource:
    # ADR-0006: Postgres gerenciado no Neon (free tier), string de conexão via env var.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/buscai}
    username: ${DATABASE_USERNAME:buscai}
    password: ${DATABASE_PASSWORD:buscai}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

buscai:
  # ADR-0005: chave estática validada por ApiKeyFilter (header X-Api-Key). Sem default de verdade
  # — ausente/vazia é tratada pelo filtro como "negar toda requisição" (fail-closed), nunca como
  # "aceitar qualquer coisa" (ver KDoc de ApiSecurityProperties).
  api-key: ${BUSCAI_API_KEY:}
  rate-limit:
    # RateLimitFilter, "a calibrar" contra tráfego real (mesma ressalva de
    # retrieval.min-cosine-similarity).
    requests-per-minute: 30
  claude:
    # specs/geracao/plan.md, seção "Config nova". ANTHROPIC_API_KEY não entra aqui — o SDK oficial
    # (AnthropicOkHttpClient.fromEnv()) já lê a variável de ambiente direto, nunca via esta chave.
    rewrite-model: claude-haiku-4-5
    answer-model: claude-sonnet-5
  generation:
    # specs/geracao/plan.md, seção "Config nova".
    max-tokens: 2048
    history-turns: 6
  ai:
    voyage:
      # ADR-0003: embeddings multilíngues via Voyage AI.
      api-key: ${VOYAGE_API_KEY:}
      model: voyage-3
      model-version: v1
  retrieval:
    # specs/retrieval/plan.md, seção "Config nova" — defaults sugeridos (min-cosine-similarity
    # marcado "a calibrar" contra o golden set, T9 de specs/retrieval/tasks.md).
    vector-candidates: 50
    lexical-candidates: 50
    top-k: 8
    rrf-k: 60
    token-budget: 3000
    min-cosine-similarity: 0.5
    neighbor-dedup-min-overlap-chars: 75
