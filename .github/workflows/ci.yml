name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancela runs obsoletos do mesmo PR/branch ao empurrar commit novo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  wrapper-validation:
    name: validar gradle-wrapper.jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  backend:
    name: backend (build + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build, test e ktlint
        run: ./gradlew build --console=plain

  android:
    name: android (build + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew ktlintCheck --console=plain

      - name: Lint
        run: ./gradlew lint --console=plain

      - name: Testes unitários
        run: ./gradlew testDebugUnitTest --console=plain

      - name: Build debug
        run: ./gradlew assembleDebug --console=plain
