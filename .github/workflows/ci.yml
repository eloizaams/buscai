name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancela runs obsoletos do mesmo PR/branch ao empurrar commit novo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  wrapper-validation:
    name: validar gradle-wrapper.jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  backend:
    name: backend (build + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build, test e ktlint
        run: ./gradlew build --console=plain

# Job android removido (ver ADR-0011): app Android é scaffold pausado, mantido intocado até
# decisão explícita de retomar — sem trabalho ativo, ninguém corrige regressões ali (ex.:
# compileSdk 36 vs. androidx.core 1.19.0 exigindo 37), e um job vermelho permanente só mascara
# falhas reais em PRs sem relação com android/. wrapper-validation acima continua cobrindo
# gradlew/android por checar o repo inteiro.
